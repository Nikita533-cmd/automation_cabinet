volumes:
  pg_data_production:
  static:
  media:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data

  backend:
    image: dockernikita1/foodgram_backend
    env_file: .env
    volumes:
      - static:/backend_static
      - media:/app/media
    depends_on:
      - db

  frontend:
    image: dockernikita1/foodgram_frontend
    env_file: .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static:/frontend_static
      - media:/media
  gateway:
    image: dockernikita1/foodgram_gateway
    env_file: .env
    ports:
      - 8080:80
    volumes:
      - static:/staticfiles
      - media:/media             # ← Nginx /media/
    depends_on:
      - backend
      - frontend