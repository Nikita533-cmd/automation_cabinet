{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модель</title>
    
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <link href="{% static '/bootstrap/assets/dist/css/bootstrap.min.css' %}" rel="stylesheet">
    
    <!-- <link href="{% static '/bootstrap/assets/dist/css/bootstrap.min.css' %}" rel="stylesheet">         -->
    <script type="importmap">
    {
        "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@latest/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@latest/examples/jsm/"
        }
    }
    </script> 
    
    <script type="module" src="{% static 'js/main.js' %}"></script> 
    {% comment %} <script type="module" src="./main.js"></script> {% endcomment %}
    <link href="{% static 'css/styles.css' %}?_v08" rel="stylesheet">
</head>
<body>
    <div class="loader-container">
        <div class="loader"></div>
        <h1>Подождите, страница загружается...</h1>            
    </div>
    <div class="container my-4">
        <h1>
            Конфигуратор шкафов                    
        </h1>
    </div>    
    <div class="form">
        <form id="input_form" method="post" novalidate>
            {% csrf_token %}
            <h2>Запрашиваемые параметры</h2>
            <div class="initial_data">
                <table class="parameters table">
                    <colgroup>
                        <col style="width: 23.3%;">
                        <col style="width: 10%;">
                        <col style="width: 23.3%;">
                        <col style="width: 10%;">
                        <col style="width: 23.3%;">
                        <col style="width: 10%;">                        
                    </colgroup>
                    <tr id="row1" >
                        <td colspan="6" style="text-align: center; ">
                            <label class="form-label">
                                Пропускная мощность щита
                            </label>
                        </td>
                    </tr>
                    <tr id="row2">
                        <td style="text-align: right;">
                            <select class="form-control" id="voltage" name="voltage" required>
                                <option>220</option>
                                <option>380</option>
                            </select>
                        </td>
                        <td style="text-align: left;">В</td>
                        <td style="text-align: right;">
                            <input type="number" class="form-control" id="power" name="power" required min="1" max="95" step="0.01"
                            oninput="if(parseFloat(this.value) > 95) this.value = 95;">
                        </td>
                        <td style="text-align: left;">А</td>
                        <td style="text-align: right;">
                            <input type="number" class="form-control" id="power_kvt" name="power_kvt" min="0.22" max="36.10" step="0.01" 
                            oninput="if(parseFloat(this.value) > 36.10) this.value = 36.10;">
                        </td>
                        <td id="recalculation" style="text-align: left;">кВт</td>
                    </tr>
                        
                    
                    <tr id="row3">
                        <td colspan="4" style="text-align: left; padding-left: 0px;">
                            <label class="form-label">
                                Количество вводов
                            </label>
                        </td>
                        <td style="text-align: right;">
                            <select class="form-control" id="count" name="count" required>
                                <option>1</option>
                                <option>2</option>
                            </select>
                        </td>
                        <td style="text-align: left;">шт.</td>                        
                    </tr>
                    <tr id="row4">
                        <td colspan="4" style="text-align: left; padding-left: 0px;">
                            <label class="form-label">
                                Автоматический ввод резерва
                            </label>
                        </td>
                        <td style="text-align: right;">
                            <input type="checkbox" name="checkbox_AVR" id="checkbox_AVR">                            
                        </td>
                        <td style="text-align: left;"></td>                        
                    </tr>
                    <tr id="row5">
                        <td colspan="4" style="text-align: left; padding-left: 0px;">
                            <label class="form-label">
                                Количество отводящих линий
                            </label>
                        </td>
                        <td style="text-align: right;">
                            <input type="number" class="form-control" id="outlet" name="outlet" required min="1" max="10" step="1" 
                            oninput="this.value = Math.max(1, Math.min(10, parseFloat(this.value)));">      
         

                        </td>
                        <td style="text-align: left;">шт.</td>                        
                    </tr>
                </table>

                <div id="count_outlet"></div>

            </div>
            
            
        </form>
        <div class="window">
            <h2>
                Окно для просмотра модели
            </h2>
            <div id="okno">
            </div>
            <div class="container my-4">
                <div id="price">
                
                </div>
                <div id="massa">
                    
                </div>
            </div>
            
        </div>
    </div>
    <div class="col-md-2 d-grid">
      <button type="submit" form = "input_form" class="btn btn-primary" id="calculation"> Подобрать</button>
    </div>
    <!-- <div class="col-md-6 d-grid">
      <button class="btn btn-primary" id="clear"> Очистить</button>
    </div> -->
    <!-- <div class="col-md-6 d-grid">
      <button class="btn btn-primary" id="button_add"> Добавить</button>
    </div> -->
    
</body>
</html>
